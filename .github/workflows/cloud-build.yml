name: Cloud TWRP Builder with China Mirror

on:
  workflow_dispatch:
    inputs:
      use_china_mirror:
        description: 'Use China Mirror for faster download'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      build_type:
        description: 'Build Type'
        required: true
        default: 'minimal'
        type: choice
        options:
          - 'minimal'
          - 'full'
          - 'test'
      upload_artifact:
        description: 'Upload Build Artifacts'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  USE_CHINA_MIRROR: ${{ github.event.inputs.use_china_mirror }}
  BUILD_TYPE: ${{ github.event.inputs.build_type }}
  UPLOAD_ARTIFACT: ${{ github.event.inputs.upload_artifact }}
  DEVICE: 'dagu'
  TARGET: 'bootimage'

jobs:
  setup-environment:
    name: Setup Build Environment
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup Build Tools
      run: |
        echo "Setting up build environment on $(date)"
        echo "Build Type: $BUILD_TYPE"
        echo "Use China Mirror: $USE_CHINA_MIRROR"

        # Install required packages
        sudo apt-get update
        sudo apt-get install -y \
          git-core gnupg flex bison build-essential zip curl \
          zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
          libncurses5 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils \
          xsltproc unzip fontconfig python3 python3-pip \
          ccache lzop gperf libssl-dev bc rsync schedtool \
          libtinfo5 libncurses5-dev libreadline-dev \
          libz-dev libbz2-dev liblz4-tool lz4

        # Setup ccache
        ccache -M 20G

        # Install repo tool
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH=~/bin:$PATH

        echo "Build tools installed successfully"

  download-source:
    name: Download Android Source
    needs: setup-environment
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup Git Mirrors
      run: |
        echo "Setting up Git mirrors..."

        if [ "$USE_CHINA_MIRROR" = "true" ]; then
          echo "Configuring China mirrors for faster download..."
          git config --global url."https://mirrors.tuna.tsinghua.edu.cn/git/AOSP/".insteadof https://android.googlesource.com/
          git config --global url."https://mirrors.tuna.tsinghua.edu.cn/git/AOSP/".insteadof http://android.googlesource.com/
          git config --global url."https://mirrors.tuna.tsinghua.edu.cn/git/AOSP/".insteadof git://android.googlesource.com/
          echo "Git mirrors configured"
          git config --global --list | grep insteadof
        else
          echo "Using default Android repositories"
        fi

    - name: Download Minimal Source
      if: env.BUILD_TYPE == 'minimal'
      run: |
        echo "Downloading minimal Android source for TWRP..."
        mkdir -p ~/android-twrp/.repo
        cd ~/android-twrp

        # Create minimal manifest using printf to avoid heredoc issues
        printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' > .repo/local_manifest.xml
        printf '%s\n' '<manifest>' >> .repo/local_manifest.xml
        printf '%s\n' '  <remote name="aosp" fetch="https://android.googlesource.com" />' >> .repo/local_manifest.xml
        printf '%s\n' '  <remote name="twrp" fetch="https://github.com" />' >> .repo/local_manifest.xml
        printf '%s\n' '  <default revision="android-12.1.0_r27" remote="aosp" sync-j="4" />' >> .repo/local_manifest.xml
        printf '%s\n' '  <project path="build/make" name="platform/build" groups="pdk" />' >> .repo/local_manifest.xml
        printf '%s\n' '  <project path="build/soong" name="platform/build/soong" groups="pdk,tradefed" />' >> .repo/local_manifest.xml
        printf '%s\n' '  <project path="system/core" name="platform/system/core" groups="pdk" />' >> .repo/local_manifest.xml
        printf '%s\n' '  <project path="bootable/recovery" name="TeamWin/android_bootable_recovery" remote="twrp" revision="twrp-12.1" />' >> .repo/local_manifest.xml
        printf '%s\n' '</manifest>' >> .repo/local_manifest.xml

        # Initialize repo
        ~/bin/repo init -u https://android.googlesource.com/platform/manifest -b android-12.1.0_r27 --depth=1

        # Sync only essential repos
        ~/bin/repo sync -c -j4 --no-tags --no-clone-bundle --optimized-fetch \
          build/make \
          build/soong \
          system/core \
          bootable/recovery

        echo "Minimal source download completed"
        du -sh .

    - name: Setup Device Tree
      run: |
        echo "Setting up device tree..."
        cd ~/android-twrp

        # Create device directory
        mkdir -p device/xiaomi/dagu

        # Copy device tree from repository
        cp -r $GITHUB_WORKSPACE/device/xiaomi/dagu/* device/xiaomi/dagu/ 2>/dev/null || echo "Using default device tree"

        # Verify device tree
        echo "Device tree contents:"
        ls -la device/xiaomi/dagu/ || echo "Device tree not found"

  build-twrp:
    name: Build TWRP Recovery
    needs: download-source
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
    - name: Setup Build Environment
      run: |
        echo "Setting up build environment..."
        mkdir -p ~/android-twrp
        cd ~/android-twrp

        # Set environment variables
        export ANDROID_BUILD_TOP=$(pwd)
        export OUT_DIR=out
        export CCACHE_DIR=/tmp/ccache
        export USE_CCACHE=1
        export CCACHE_COMPRESS=1

        # Create ccache directory
        mkdir -p $CCACHE_DIR
        ccache -M 20G

        echo "Build environment ready"

    - name: Build TWRP
      run: |
        echo "Starting TWRP build..."
        cd ~/android-twrp

        # Source build environment
        source build/envsetup.sh

        # Lunch device
        lunch twrp_dagu-eng

        # Build recovery image
        mka recoveryimage

        echo "Build completed"

    - name: Upload Build Artifacts
      if: env.UPLOAD_ARTIFACT == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: twrp-dagu
        path: |
          ~/android-twrp/out/target/product/dagu/recovery.img
          ~/android-twrp/out/target/product/dagu/boot.img
        retention-days: 7

  notify-completion:
    name: Notify Build Completion
    needs: build-twrp
    runs-on: ubuntu-22.04
    if: always()

    steps:
    - name: Build Status Notification
      run: |
        echo "========================================"
        echo "  TWRP Build Process Completed"
        echo "========================================"
        echo ""
        echo "Device: dagu (Xiaomi Pad 5 Pro 12.4)"
        echo "Build Type: $BUILD_TYPE"
        echo "China Mirror: $USE_CHINA_MIRROR"
        echo ""
        echo "========================================"
        echo "  Build Artifacts"
        echo "========================================"
        echo ""
        echo "Download the recovery.img from the artifacts section"
        echo ""
        echo "Flash instructions:"
        echo "  fastboot flash recovery recovery.img"
        echo "  fastboot reboot recovery"
