name: Quick TWRP Test Build

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test Type'
        required: true
        default: 'env-check'
        type: choice
        options:
          - 'env-check'
          - 'build-test'
          - 'full-build'

env:
  DEVICE: 'dagu'
  TEST_TYPE: ${{ github.event.inputs.test_type }}

jobs:
  quick-test:
    name: Quick Build Test
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup Environment
      run: |
        echo "=== Environment Setup ==="
        echo "Test Type: $TEST_TYPE"
        echo "Device: $DEVICE"
        echo ""
        echo "System Information:"
        uname -a
        echo ""
        echo "CPU Cores:"
        nproc
        echo ""
        echo "Memory:"
        free -h
        echo ""
        echo "Disk Space:"
        df -h

    - name: Check TWRP Source
      run: |
        echo "=== Checking TWRP Source ==="
        if [ -d "android_bootable_recovery" ]; then
          echo "TWRP source found"
          ls -la android_bootable_recovery/
        else
          echo "TWRP source not found"
        fi

    - name: Test Build Environment
      if: env.TEST_TYPE == 'build-test' || env.TEST_TYPE == 'full-build'
      run: |
        echo "=== Build Environment Test ==="
        mkdir -p ~/test-build
        cd ~/test-build
        
        echo "Creating test files..."
        
        # Create test C file using echo
        echo '#include <stdio.h>' > test.c
        echo '' >> test.c
        echo 'int main() {' >> test.c
        echo '    printf("TWRP Build Test - Success!\n");' >> test.c
        echo '    printf("Device: dagu\n");' >> test.c
        echo '    printf("Test completed successfully\n");' >> test.c
        echo '    return 0;' >> test.c
        echo '}' >> test.c
        
        # Create simple Makefile using echo
        echo '.PHONY: all clean' > Makefile
        echo '' >> Makefile
        echo 'all: test_build' >> Makefile
        echo '' >> Makefile
        echo 'test_build:' >> Makefile
        echo '	@echo "Testing build environment..."' >> Makefile
        echo '	@echo "Building test program..."' >> Makefile
        echo '	gcc -o test_program test.c' >> Makefile
        echo '	@echo "Build completed"' >> Makefile
        echo '	@./test_program' >> Makefile
        echo '' >> Makefile
        echo 'clean:' >> Makefile
        echo '	rm -f test_program' >> Makefile
        
        echo ""
        echo "Test files created:"
        ls -la
        
        echo ""
        echo "Running test build..."
        make
        
        echo ""
        echo "Test build completed successfully!"

    - name: Summary
      run: |
        echo "========================================"
        echo "  Quick Build Test Completed"
        echo "========================================"
        echo ""
        echo "Device: $DEVICE"
        echo "Test Type: $TEST_TYPE"
        echo ""
        echo "Status: All tests passed!"
