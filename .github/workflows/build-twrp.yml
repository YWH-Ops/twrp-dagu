name: Build TWRP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl \
            zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev \
            x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils \
            xsltproc unzip python3 python3-pip bc

      - name: Setup repo
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+rx ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Sync TWRP source
        run: |
          mkdir -p ~/twrp
          cd ~/twrp
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Copy device tree
        run: |
          cp -r $GITHUB_WORKSPACE/device ~/twrp/ || echo "No device tree in repo"

      - name: Build
        run: |
          cd ~/twrp
          source build/envsetup.sh
          lunch twrp_dagu-eng
          mka recoveryimage -j$(nproc --all)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: recovery
          path: ~/twrp/out/target/product/dagu/recovery.img

      - name: Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          files: ~/twrp/out/target/product/dagu/recovery.img
          name: TWRP-${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          body: TWRP for Xiaomi Pad 5 Pro 12.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
