name: Build TWRP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends \
            git gnupg flex bison gperf build-essential zip curl \
            zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
            libncurses-dev libx11-dev libxml2-utils xsltproc unzip \
            python3 python3-pip bc || true

      - name: Setup repo
        run: |
          mkdir -p ~/.bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+rx ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Sync TWRP source
        run: |
          mkdir -p ~/twrp
          cd ~/twrp
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags
        timeout-minutes: 30

      - name: Setup device tree
        run: |
          cd ~/twrp
          # 清理可能存在的旧设备树
          rm -rf device/xiaomi/dagu
          mkdir -p device/xiaomi
          
          # 优先使用本地设备树
          if [ -d "$GITHUB_WORKSPACE/device/xiaomi/dagu" ]; then
            echo "Using local device tree"
            cp -r $GITHUB_WORKSPACE/device/xiaomi/dagu device/xiaomi/
          else
            echo "Cloning device tree from GitHub"
            git clone --depth=1 https://github.com/b15185591889/twrp-dagu.git device/xiaomi/dagu || \
            git clone --depth=1 https://github.com/YWH-Ops/twrp-dagu.git device/xiaomi/dagu
          fi
          
          # 验证设备树
          echo "Device tree contents:"
          ls -la device/xiaomi/dagu/

      - name: Build TWRP
        run: |
          cd ~/twrp
          source build/envsetup.sh
          lunch twrp_dagu-eng
          mka recoveryimage -j4
        timeout-minutes: 60

      - name: Upload recovery
        uses: actions/upload-artifact@v4
        with:
          name: twrp-recovery
          path: ~/twrp/out/target/product/dagu/recovery.img

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          files: ~/twrp/out/target/product/dagu/recovery.img
          name: TWRP-dagu-${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          body: |
            TWRP Recovery for Xiaomi Pad 5 Pro 12.4 (dagu)
            
            Build Date: ${{ github.event.head_commit.timestamp }}
            
            ## Installation
            ```bash
            fastboot flash recovery recovery.img
            fastboot reboot recovery
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
